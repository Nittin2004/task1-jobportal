<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5" />
      <stop offset="50%" stop-color="#7C3AED" />
      <stop offset="100%" stop-color="#0284C7" />
    </linearGradient>
    
    <!-- Accent Gradient for Arrow / Spark -->
    <linearGradient id="arrow-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38BDF8" />
      <stop offset="50%" stop-color="#A855F7" />
      <stop offset="100%" stop-color="#FACC15" />
    </linearGradient>
    
    <!-- Inner Glow & Drop Shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#0f172a" flood-opacity="0.35" />
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Main Rounded Background -->
  <rect width="512" height="512" rx="140" fill="url(#bg-grad)" />
  
  <!-- Subtle Glass / Shine border overlay -->
  <rect x="12" y="12" width="488" height="488" rx="128" fill="none" stroke="#FFFFFF" stroke-width="8" stroke-opacity="0.25" />
  <circle cx="420" cy="92" r="140" fill="#FFFFFF" fill-opacity="0.1" />
  <circle cx="92" cy="420" r="160" fill="#000000" fill-opacity="0.15" />
  
  <!-- The NextHire Emblem (Monogram N + Upward Career Rocket/Arrow) -->
  <g filter="url(#shadow)">
    <!-- Briefcase Arch / Career Bridge -->
    <path d="M 190 150 C 190 100, 322 100, 322 150" fill="none" stroke="#E0E7FF" stroke-width="26" stroke-linecap="round" stroke-opacity="0.8" />
    
    <!-- Left Pillar of N -->
    <rect x="130" y="150" width="64" height="230" rx="32" fill="#FFFFFF" />
    
    <!-- Diagonal Connecting Bar -->
    <path d="M 160 170 L 350 360" stroke="#FFFFFF" stroke-width="64" stroke-linecap="round" />
    
    <!-- Right Pillar of N -->
    <rect x="318" y="150" width="64" height="230" rx="32" fill="#FFFFFF" />
    
    <!-- Upward Ascending Career Arrow on top of Right Pillar -->
    <path d="M 350 160 L 350 75" stroke="url(#arrow-grad)" stroke-width="48" stroke-linecap="round" />
    <path d="M 290 135 L 350 65 L 410 135" fill="none" stroke="url(#arrow-grad)" stroke-width="48" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" />
  </g>
  
  <!-- Futuristic Career Star / Sparkle in Top Right -->
  <path d="M 440 100 Q 440 115 455 115 Q 440 115 440 130 Q 440 115 425 115 Q 440 115 440 100 Z" fill="#FACC15" filter="url(#glow)" />
  <path d="M 90 380 Q 90 392 102 392 Q 90 392 90 404 Q 90 392 78 392 Q 90 392 90 380 Z" fill="#38BDF8" fill-opacity="0.8" />
</svg>